services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: brecho
    container_name: brecho_app
    ports:
      - 8000:8000
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=db
    networks:
      - application
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        composer install
        php artisan migrate
        php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - 3306:3306
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: brecho
      MYSQL_ROOT_PASSWORD: 1234
    networks:
      - application
    container_name: mysql_db


volumes:
  db_data:

networks:
  application:
    driver: bridge
